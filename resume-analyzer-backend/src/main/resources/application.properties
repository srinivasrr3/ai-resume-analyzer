spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.main.allow-bean-definition-overriding=true
server.port=${PORT:8080}

# Database configuration
spring.datasource.url=${DB_URL:${JDBC_DATABASE_URL:jdbc:h2:file:./data/resume_analyzer_db;AUTO_SERVER=TRUE}}
spring.datasource.username=${DB_USERNAME:${JDBC_DATABASE_USERNAME:sa}}
spring.datasource.password=${DB_PASSWORD:${JDBC_DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=${DB_DRIVER:${JDBC_DATABASE_DRIVER:org.h2.Driver}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 console for local debugging only
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
